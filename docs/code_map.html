<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pallet Optimizer — Carte interactive du code</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/style.css" />
<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --panel2:#1c2230; --border:#2b3340;
    --text:#e6edf3; --muted:#9aa7b4; --accent:#58a6ff;
  }
  *{box-sizing:border-box}
  html,body,#root{height:100%;margin:0}
  body{background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .app{display:flex;flex-direction:column;height:100%}
  header{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:600}
  header .sub{color:var(--muted);font-size:12px}
  .spacer{flex:1}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .seg button{background:transparent;color:var(--muted);border:0;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:500}
  .seg button.on{background:var(--accent);color:#04121f}
  .body{flex:1;display:flex;min-height:0}
  .canvas{flex:1;position:relative}
  .side{width:360px;border-left:1px solid var(--border);background:var(--panel);overflow:auto;padding:16px}
  .toolbar{position:absolute;z-index:5;top:12px;left:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;max-width:75%}
  .chip{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:5px 11px;font-size:12px;cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:6px}
  .chip .dot{width:9px;height:9px;border-radius:50%}
  .chip.off{opacity:.38}
  .stepbtn{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px}
  .stepbtn:disabled{opacity:.4;cursor:default}
  .stepname{font-weight:600;font-size:13px;padding:0 6px;min-width:210px;text-align:center}
  /* nodes */
  .node{border-radius:10px;border:1px solid var(--border);padding:8px 11px;min-width:150px;max-width:210px;background:var(--panel2);box-shadow:0 1px 3px rgba(0,0,0,.4);cursor:pointer}
  .node .nt{font-weight:600;font-size:12.5px;display:flex;align-items:center;gap:6px;line-height:1.25}
  .node .nf{color:var(--muted);font-size:10.5px;margin-top:3px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;word-break:break-all}
  .node .lbadge{font-size:9px;text-transform:uppercase;letter-spacing:.5px;padding:1px 6px;border-radius:6px;color:#04121f;font-weight:700}
  .node.dim{opacity:.22}
  .node.sel{outline:2px solid var(--accent);outline-offset:1px}
  .pnode{border-radius:12px;padding:10px 13px;min-width:220px;background:linear-gradient(180deg,#1d2533,#161b22);border:1px solid #34405200}
  .pnode .pt{font-weight:700;font-size:13.5px}
  .pnode .ps{color:var(--muted);font-size:11px;margin-top:2px}
  .pnode.dim{opacity:.3}
  .pnode.sel{outline:2px solid var(--accent);outline-offset:2px}
  /* side panel */
  .side h2{font-size:15px;margin:0 0 2px}
  .side .file{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--accent);word-break:break-all}
  .side .lay{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:6px;color:#04121f;font-weight:700;margin:8px 0}
  .side p.desc{color:var(--text);margin:6px 0 14px}
  .side h3{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:5px}
  .fn{margin:0 0 10px}
  .fn .name{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:#7ee787}
  .fn .why{color:var(--muted);font-size:12px;margin-top:1px}
  .modtable{display:flex;flex-direction:column;gap:8px}
  .modrow{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer}
  .modrow:hover{border-color:var(--accent)}
  .modrow .mr1{display:flex;align-items:center;gap:7px;font-weight:600;font-size:12.5px}
  .modrow .mr2{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10.5px;color:var(--muted);margin-top:2px}
  .modrow .mr3{font-size:11.5px;color:var(--muted);margin-top:4px}
  .hint{color:var(--muted);font-size:12px;margin-top:10px}
  .legend{font-size:11px;color:var(--muted);margin-top:18px;line-height:1.7}
  a{color:var(--accent)}
  .react-flow__attribution{display:none}
</style>
</head>

  ['box','orientation'],['placed_box','orientation'],['pallet','placed_box'],
  ['view_palette','vdata'],['view_palette','renderer'],
  ['exporter','vdata'],['exporter','renderer'],
  ['visualizer','view_palette'],['visualizer','view_kpi'],['visualizer','vdata'],['visualizer','renderer'],
  ['main','parameters'],['main','csv_reader'],['main','csv_writer'],['main','kpi_writer'],['main','pallet_optimizer'],['main','post_processing'],
  ['app','parameters'],
];

// Pipeline (le « multi-étapes »)
const PHASES = [
  { id:'p0', title:'Phase 0 — Validation CSV', sub:'Lecture & contrôle entrée',
    desc:"Le CSV d’entrée est lu et validé. Les colis deviennent des objets Box. En cas d’erreur : ERR_VALIDATION / ERR_EMPTY_INPUT.",
    modules:['csv_reader','box','orientation'] },
  { id:'p1', title:'Phase 1 — FFD initial', sub:'First Fit Decreasing (mono-client)',
    desc:"Tri (priorité ↑, volume ↓, poids ↓) puis empaquetage First Fit Decreasing client par client, via l’heuristique Extreme Points et la validation de contraintes.",
    modules:['ffd','sorting','placement_engine','collision_detection','stacking_rules','stability_check','geometry','box','pallet','placed_box'] },
  { id:'p2', title:'Phase 2 — LNS mono-client', sub:'Réduire le nb de palettes',
    desc:"Recherche à grand voisinage par client : détruire la palette la moins remplie + petits colis, réparer en top-k, accepter si coût (500×n + 400×min_fill) diminue.",
    modules:['lns_mono','lns_utils','placement_engine'] },
  { id:'p3', title:'Phase 3 — Fusion multi-client', sub:'Stratégie adaptative (5 régimes)',
    desc:"Selon le nombre de palettes après Phase 2 : fusion des palettes les moins remplies en palettes multi-client (boucles fill-driven ou condition d’arrêt composée).",
    modules:['pallet_optimizer','ffd'] },
  { id:'p4', title:'Phase 4 — LNS multi-client', sub:'Réduire le total de palettes',
    desc:"LNS sur les palettes multi-client (+ extra_mono de la Phase 3) : détruit ≥2 palettes les moins remplies par itération. Coût = 10×n_palettes.",
    modules:['lns_multi','lns_utils','placement_engine'] },
  { id:'p5', title:'Phase 5 — Post-traitement', sub:'Contact P2/P1, équilibre, gap repair',
    desc:"En mémoire : dépalettise les P2, rééquilibre le remplissage des P1, replace les P2 par contact maximal, répare les vides (water-fill XZ), centre la charge.",
    modules:['post_processing','placement_engine'] },
  { id:'p6', title:'Phase 6 — Vérification sécurité', sub:'Intégrité avant écriture',
    desc:"Contrôles en mémoire AVANT toute écriture : conservation des colis, unicité des séquences, immutabilité des champs Box. Échec → ERR_SECURITY, rien n’est écrit.",
    modules:['main','box','placed_box','pallet'] },
  { id:'po', title:'Sortie — CSV + KPI', sub:'Écriture des résultats',
    desc:"Si la Phase 6 passe : écriture du CSV de résultats et génération du rapport KPI Excel agrégé en fin de lot.",
    modules:['csv_writer','kpi_writer'] },
  { id:'pv', title:'Visualisation', sub:'Apps Dash (port 8053) + export',
    desc:"Visualiseur unifié : vues grille/zoom 3D, rapport KPI, export PNG. Lit le CSV de résultats produit par le pipeline.",
    modules:['visualizer','view_palette','view_kpi','renderer','vdata','exporter'] },
];

/* ---------------------------- Composants nœuds --------------------------- */
function ModuleNode({ data }){
  const c = LAYERS[data.layer].color;
  const cls = 'node' + (data.dim?' dim':'') + (data.sel?' sel':'');
  return html`<div class=${cls} style=${{borderColor:c+'88'}}>
    <${Handle} type="target" position=${Position.Left} id="in" style=${{opacity:0}}/>
    <div class="nt"><span class="lbadge" style=${{background:c}}>${LAYERS[data.layer].label}</span></div>
    <div class="nt" style=${{marginTop:4}}>${data.title}</div>
    <div class="nf">${data.file}</div>
    <${Handle} type="source" position=${Position.Right} id="out" style=${{opacity:0}}/>
  </div>`;
}
function PhaseNode({ data }){
  const cls = 'pnode' + (data.dim?' dim':'') + (data.sel?' sel':'');
  return html`<div class=${cls} style=${{border:'1px solid '+(data.sel?'#58a6ff':'#34405288')}}>
    <${Handle} type="target" position=${Position.Top} id="in" style=${{opacity:0}}/>
    <div class="pt">${data.title}</div>
    <div class="ps">${data.sub}</div>
    <${Handle} type="source" position=${Position.Bottom} id="out" style=${{opacity:0}}/>
    <${Handle} type="source" position=${Position.Right} id="side" style=${{opacity:0}}/>
  </div>`;
}
const nodeTypes = { module: ModuleNode, phase: PhaseNode };

/* ------------------------------ Side panel ------------------------------- */
function ModuleDetail({ id, onPick }){
  const m = MODULES[id];
  const c = LAYERS[m.layer].color;
  const deps = DEPS.filter(d=>d[0]===id).map(d=>d[1]);
  return html`<div>
    <h2>${m.label}</h2>
    <div class="file">${m.file}</div>
    <span class="lay" style=${{background:c}}>${LAYERS[m.layer].label}</span>
    <p class="desc">${m.purpose}</p>
    <h3>Fonctions / classes — à quoi ça sert</h3>
    ${m.funcs.map((f,i)=>html`<div class="fn" key=${i}>
      <div class="name">${f[0]}</div><div class="why">${f[1]}</div></div>`)}
    ${deps.length?html`<h3>Dépend de</h3>
      <div style=${{display:'flex',flexWrap:'wrap',gap:6}}>
        ${deps.map(d=>html`<span class="chip" key=${d} onClick=${()=>onPick(d)}>
          <span class="dot" style=${{background:LAYERS[MODULES[d].layer].color}}></span>${MODULES[d].label}</span>`)}
      </div>`:null}
  </div>`;
}
function PhaseDetail({ phase, onPick }){
  return html`<div>
    <h2>${phase.title}</h2>
    <div class="file">${phase.sub}</div>
    <p class="desc" style=${{marginTop:12}}>${phase.desc}</p>
    <h3>Modèles / modules utilisés — quel fichier</h3>
    <div class="modtable">
      ${phase.modules.map(mid=>{const m=MODULES[mid];const c=LAYERS[m.layer].color;
        return html`<div class="modrow" key=${mid} onClick=${()=>onPick(mid)}>
          <div class="mr1"><span class="dot" style=${{width:9,height:9,borderRadius:'50%',background:c,display:'inline-block'}}></span>${m.label}
            <span style=${{marginLeft:'auto',fontSize:10,color:c,textTransform:'uppercase',letterSpacing:.5}}>${LAYERS[m.layer].label}</span></div>
          <div class="mr2">${m.file}</div>
          <div class="mr3">${m.purpose.split('. ')[0]}.</div>
        </div>`;})}
    </div>
    <p class="hint">Cliquez une carte ci-dessus (ou un nœud à droite) pour voir le détail des fonctions.</p>
  </div>`;
}

/* --------------------------------- App ----------------------------------- */
const COL_W = 270, ROW_H = 116;
function layerModules(layer){ return Object.keys(MODULES).filter(k=>MODULES[k].layer===layer); }

function App(){
  const [mode, setMode] = useState('pipeline');     // 'pipeline' | 'architecture'
  const [step, setStep] = useState(0);
  const [sel, setSel] = useState(null);             // module id sélectionné
  const [hiddenLayers, setHiddenLayers] = useState(()=>new Set());

  const pick = useCallback((id)=>{ setSel(id); }, []);

  // ---------- ARCHITECTURE ----------
  const arch = useMemo(()=>{
    const nodes=[], edges=[];
    Object.keys(LAYERS).forEach(layer=>{
      const mods = layerModules(layer);
      mods.forEach((id,i)=>{
        const m=MODULES[id];
        nodes.push({ id, type:'module', position:{x:LAYERS[layer].col*COL_W, y:60+i*ROW_H},
          data:{ title:m.label, file:m.file, layer, sel:sel===id,
                 dim: hiddenLayers.has(layer) || (sel && sel!==id && !DEPS.some(d=>(d[0]===sel&&d[1]===id)||(d[1]===sel&&d[0]===id))) },
          hidden: hiddenLayers.has(layer) });
      });
    });
    DEPS.forEach(([a,b],i)=>{
      const hl = sel && (a===sel||b===sel);
      edges.push({ id:'e'+i, source:a, target:b, sourceHandle:'out', targetHandle:'in',
        hidden: hiddenLayers.has(MODULES[a].layer)||hiddenLayers.has(MODULES[b].layer),
        style:{ stroke: hl?'#58a6ff':'#3a4452', strokeWidth: hl?2:1 },
        markerEnd:{ type:'arrowclosed', color: hl?'#58a6ff':'#3a4452' } });
    });
    return { nodes, edges };
  }, [sel, hiddenLayers]);

  // ---------- PIPELINE ----------
  const pipe = useMemo(()=>{
    const nodes=[], edges=[];
    PHASES.forEach((p,i)=>{
      nodes.push({ id:p.id, type:'phase', position:{x:60, y:40+i*120},
        data:{ title:p.title, sub:p.sub, sel: i===step, dim: false } });
      if(i<PHASES.length-1)
        edges.push({ id:'pe'+i, source:p.id, target:PHASES[i+1].id, sourceHandle:'out', targetHandle:'in',
          style:{ stroke: i<step?'#3a4452':'#58a6ff', strokeWidth:2 },
          markerEnd:{ type:'arrowclosed', color:i<step?'#3a4452':'#58a6ff' }, animated: i===step });
    });
    // modules de la phase active, en colonne à droite
    const active = PHASES[step];
    active.modules.forEach((mid,j)=>{
      const m=MODULES[mid];
      nodes.push({ id:'m_'+mid, type:'module', position:{x:430, y:40+j*98},
        data:{ title:m.label, file:m.file, layer:m.layer, sel:sel===mid, dim:false } });
      edges.push({ id:'pm'+j, source:active.id, target:'m_'+mid, sourceHandle:'side', targetHandle:'in',
        style:{ stroke:LAYERS[m.layer].color, strokeWidth:1.5, opacity:.7 },
        markerEnd:{ type:'arrowclosed', color:LAYERS[m.layer].color } });
    });
    return { nodes, edges };
  }, [step, sel]);

  const { nodes, edges } = mode==='pipeline' ? pipe : arch;

  const onNodeClick = useCallback((_,node)=>{
    if(node.type==='phase'){ const i=PHASES.findIndex(p=>p.id===node.id); if(i>=0){setStep(i);setSel(null);} }
    else { setSel(node.id.replace(/^m_/,'')); }
  }, []);

  const toggleLayer = (l)=> setHiddenLayers(s=>{ const n=new Set(s); n.has(l)?n.delete(l):n.add(l); return n; });

  // side content
  let side;
  if(sel) side = html`<${ModuleDetail} id=${sel} onPick=${pick}/>`;
  else if(mode==='pipeline') side = html`<${PhaseDetail} phase=${PHASES[step]} onPick=${pick}/>`;
  else side = html`<div>
      <h2>Architecture des modules</h2>
      <p class="desc">Chaque nœud est un fichier Python. Les flèches montrent les dépendances (imports). Cliquez un nœud pour voir ses fonctions et ce qu’elles font, ou filtrez par couche.</p>
      <h3>Couches</h3>
      <div style=${{display:'flex',flexWrap:'wrap',gap:6}}>
        ${Object.entries(LAYERS).map(([k,v])=>html`<span class=${'chip'+(hiddenLayers.has(k)?' off':'')} key=${k} onClick=${()=>toggleLayer(k)}>
          <span class="dot" style=${{background:v.color}}></span>${v.label}</span>`)}
      </div>
      <p class="hint">Astuce : sélectionnez un nœud pour mettre en évidence ses dépendances.</p>
    </div>`;

  return html`<div class="app">
    <header>
      <div><h1>Pallet Optimizer — Carte interactive du code</h1>
        <div class="sub">Quelles fonctions / modèles, pour quoi faire, dans quel fichier</div></div>
      <div class="spacer"></div>
      <div class="seg">
        <button class=${mode==='pipeline'?'on':''} onClick=${()=>{setMode('pipeline');setSel(null);}}>Flux / Étapes</button>
        <button class=${mode==='architecture'?'on':''} onClick=${()=>{setMode('architecture');setSel(null);}}>Architecture</button>
      </div>
    </header>
    <div class="body">
      <div class="canvas">
        ${mode==='pipeline' ? html`<div class="toolbar">
          <button class="stepbtn" disabled=${step===0} onClick=${()=>{setStep(s=>Math.max(0,s-1));setSel(null);}}>← Précédent</button>
          <span class="stepname">${PHASES[step].title}</span>
          <button class="stepbtn" disabled=${step===PHASES.length-1} onClick=${()=>{setStep(s=>Math.min(PHASES.length-1,s+1));setSel(null);}}>Suivant →</button>
          ${PHASES.map((p,i)=>html`<span class=${'chip'+(i===step?'':' off')} key=${p.id} onClick=${()=>{setStep(i);setSel(null);}}>${i}</span>`)}
        </div>` : null}
        <${ReactFlow} key=${mode} nodes=${nodes} edges=${edges} nodeTypes=${nodeTypes}
            onNodeClick=${onNodeClick} fitView minZoom=${0.2} proOptions=${{hideAttribution:true}}>
          <${Background} color="#222b36" gap=${22}/>
          <${Controls}/>
          <${MiniMap} pannable zoomable nodeColor=${(n)=> n.type==='phase' ? '#58a6ff' : LAYERS[MODULES[n.id.replace(/^m_/,'')]?.layer||'core'].color}
            maskColor="rgba(0,0,0,0.6)" style=${{background:'#0e1117'}}/>
        </${ReactFlow}>
      </div>
      <div class="side">${side}</div>
    </div>
  </div>`;
}

createRoot(document.getElementById('root')).render(
  html`<${ReactFlowProvider}><${App}/></${ReactFlowProvider}>`
);
</script>
</body>
</html>
